services:
  backend:
    env_file:
      - ./backend/.env
    container_name: django_backend
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8002:8000"

  frontend:
    env_file:
      - ./frontend/.env
    container_name: next_frontend
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    ports:
      - "3002:3000"
